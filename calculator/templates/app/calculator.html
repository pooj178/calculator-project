<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        header {
            text-align: center;
            padding: 20px;
            color: white;
            font-size: 26px;
            font-weight: bold;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding-bottom: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            position: relative;
        }

        nav a::after {
            content: '';
            width: 0%;
            height: 2px;
            background: white;
            position: absolute;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* CALCULATOR CARD */
        .container {
            margin: auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 22px;
            margin-bottom: 15px;
            text-align: right;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 12px;
        }

        button {
            height: 60px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .operator {
            background: #ff7a18;
            color: white;
        }

        .equal {
            background: #28a745;
            color: white;
        }

        .clear {
            background: #dc3545;
            color: white;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <header>Calculator App</header>

    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'calculator' %}">Calculator</a>
        <a href="#">About</a>
    </nav>

    <!-- CALCULATOR -->
    <div class="container">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button onclick="clearDisplay()" class="clear">C</button>
            <button onclick="append('/')">/</button>
            <button onclick="append('*')">*</button>
            <button onclick="append('-')">-</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('+')" class="operator">+</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="calculate()" class="equal">=</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="append('0')">0</button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 Calculator App
    </footer>

    <script>
        function append(value) {
            document.getElementById("display").value += value;
        }

        function clearDisplay() {
            document.getElementById("display").value = "";
        }

        function calculate() {
            try {
                document.getElementById("display").value =
                    eval(document.getElementById("display").value);
            } catch {
                alert("Invalid Expression");
            }
        }
    </script>

</body>
</html>
