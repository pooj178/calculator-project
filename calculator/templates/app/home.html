<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Calculator App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 20px;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            position: relative;
        }

        nav a::after {
            content: '';
            width: 0%;
            height: 2px;
            background: white;
            position: absolute;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        .container {
            margin: auto;
            text-align: center;
            padding: 40px;
            width: 90%;
            max-width: 500px;

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .container h2 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .container p {
            font-size: 16px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 30px;
            background: #ff7a18;
            background: linear-gradient(to right, #ff7a18, #ffb347);
            color: white;
            text-decoration: none;
            font-size: 18px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        footer {
            text-align: center;
            padding: 15px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        Calculator App
    </header>

    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'calculator' %}">Calculator</a>
        <a href="#">About</a>
    </nav>

    <div class="container">
        <h2>✨ Simple & Beautiful Calculator</h2>
        <p>Fast, clean, and easy-to-use calculator built with Django.</p>

        <a href="{% url 'calculator' %}" class="btn">🚀 Open Calculator</a>
    </div>

    <footer>
        © 2026 Calculator App
    </footer>

</body>
</html>
